buckets:
  - demo
principals:
  - name: admin
    policies:
      - statements:
          - effect: Allow
            actions: ["*"]
            resources: ["*"]
    access_keys:
      - id: admin
        secret: admin-secret
roles:
  - name: data-reader
    trust:
      statements:
        - effect: Allow
          principals: ["admin"]
          actions: ["sts:AssumeRole"]
    policies:
      - statements:
          - effect: Allow
            actions: ["s3:GetObject", "s3:ListBucket"]
            resources: ["arn:mockbucket:s3:::demo", "arn:mockbucket:s3:::demo/*"]
objects:
  - bucket: demo
    key: bootstrap/hello.txt
    content: hello from mockbucket
