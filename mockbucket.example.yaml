server:
  address: 127.0.0.1:9000
  request_log: true
  shutdown_timeout: 10s
storage:
  root_dir: ./var/objects
  sqlite_path: ./var/mockbucket.db
frontends:
  type: s3  # s3 | gcs
seed:
  buckets:
    - demo
  roles:
    - name: data-reader
  s3:
    access_keys:
      - id: admin
        secret: admin-secret
      - id: restricted
        secret: restricted-secret
        allowed_roles:
          - data-reader
  gcs:
    service_credentials:
      - client_email: admin@mockbucket.iam.gserviceaccount.com
        principal: admin
    tokens:
      - token: "hardcoded-token-123"
        principal: admin
  objects:
    - bucket: demo
      key: bootstrap/hello.txt
      content: hello from mockbucket
