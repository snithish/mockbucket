server:
  address: 127.0.0.1:9000
  request_log: true
  shutdown_timeout: 10s
storage:
  root_dir: ./var/objects
  sqlite_path: ./var/mockbucket.db
seed:
  path: ./seed.example.yaml
frontends:
  s3: true
  sts: true
  gcs: false
  azure: false
# Supported profiles:
# - S3 + STS: s3: true, sts: true, gcs: false
# - S3 only: s3: true, sts: false, gcs: false
# - GCS only: s3: false, sts: false, gcs: true
auth:
  session_duration: 1h
