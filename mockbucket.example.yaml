server:
  address: 127.0.0.1:9000
  request_log: true
  shutdown_timeout: 10s
storage:
  root_dir: ./var/objects
  sqlite_path: ./var/mockbucket.db
frontends:
  s3: true
  gcs: false
  azure: false
# Supported profiles:
# - S3 (with STS): s3: true, gcs: false
# - GCS only: s3: false, gcs: true
# - GCS auth: use gcs.tokens for hardcoded bearer tokens
#   OR auto-generated JWT: fetch GET /api/v1/gcs/service-account
auth:
  session_duration: 1h
seed:
  buckets:
    - demo
  principals:
    - name: admin
  roles:
    - name: data-reader
  s3:
    access_keys:
      - id: admin
        secret: admin-secret
        principal: admin
  gcs:
    tokens:
      - token: "hardcoded-token-123"
        principal: admin
  objects:
    - bucket: demo
      key: bootstrap/hello.txt
      content: hello from mockbucket
