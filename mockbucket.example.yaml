server:
  address: 127.0.0.1:9000
  request_log: true
  shutdown_timeout: 10s
storage:
  root_dir: ./var/objects
  sqlite_path: ./var/mockbucket.db
frontends:
  s3: true
  sts: true
  gcs: false
  azure: false
# Supported profiles:
# - S3 + STS: s3: true, sts: true, gcs: false
# - S3 only: s3: true, sts: false, gcs: false
# - GCS only: s3: false, sts: false, gcs: true
# - GCS auth: use gcs.tokens for hardcoded bearer tokens
#   OR auto-generated JWT: fetch GET /api/v1/gcs/service-account
auth:
  session_duration: 1h
seed:
  buckets:
    - demo
  principals:
    - name: admin
      policies:
        - statements:
            - effect: Allow
              actions: ["*"]
              resources: ["*"]
  roles:
    - name: data-reader
      trust:
        statements:
          - effect: Allow
            principals: ["admin"]
            actions: ["sts:AssumeRole"]
      policies:
        - statements:
            - effect: Allow
              actions: ["s3:GetObject", "s3:ListBucket"]
              resources: ["arn:mockbucket:s3:::demo", "arn:mockbucket:s3:::demo/*"]
  s3:
    access_keys:
      - id: admin
        secret: admin-secret
        principal: admin
  gcs:
    tokens:
      - token: "hardcoded-token-123"
        principal: admin
  objects:
    - bucket: demo
      key: bootstrap/hello.txt
      content: hello from mockbucket
