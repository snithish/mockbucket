server:
  address: 127.0.0.1:9000
  request_log: true
  request_capture:
    enabled: false
    path: ./var/requests
  shutdown_timeout: 10s
storage:
  root_dir: ./var/objects
  sqlite_path: ./var/mockbucket.db
frontends:
  type: s3
seed:
  buckets:
    - demo
  roles:
    - name: data-reader
  s3:
    access_keys:
      - id: admin
        secret: admin-secret
      - id: restricted
        secret: restricted-secret
        allowed_roles:
          - data-reader
  objects:
    - bucket: demo
      key: bootstrap/hello.txt
      content: hello from mockbucket
