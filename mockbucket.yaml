server:
  address: 127.0.0.1:9000
  request_log: true
  shutdown_timeout: 10s
storage:
  root_dir: ./var/objects
  sqlite_path: ./var/mockbucket.db
frontends:
  s3: true
  gcs: false
  azure: false
auth:
  session_duration: 1h
seed:
  buckets:
    - demo
  principals:
    - name: admin
  roles:
    - name: data-reader
  s3:
    access_keys:
      - id: admin
        secret: admin-secret
        principal: admin
  objects:
    - bucket: demo
      key: bootstrap/hello.txt
      content: hello from mockbucket
