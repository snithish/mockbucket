server:
  address: 0.0.0.0:9000
  request_log: true
  shutdown_timeout: 10s
storage:
  root_dir: /tmp/data/objects
  sqlite_path: /tmp/data/mockbucket.db
frontends:
  type: s3
auth:
  session_duration: 1h
seed:
  buckets:
    - demo
  roles:
    - name: data-reader
  s3:
    access_keys:
      - id: admin
        secret: admin-secret
  objects:
    - bucket: demo
      key: bootstrap/hello.txt
      content: hello from mockbucket
