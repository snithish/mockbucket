server:
  address: 0.0.0.0:9000
  request_log: true
  shutdown_timeout: 10s
storage:
  root_dir: /var/data/objects
  sqlite_path: /var/data/mockbucket.db
frontends:
  s3: true
  sts: true
  gcs: false
  azure: false
auth:
  session_duration: 1h
seed:
  buckets:
    - demo
  principals:
    - name: admin
      policies:
        - statements:
            - effect: Allow
              actions: ["*"]
              resources: ["*"]
  roles:
    - name: data-reader
      trust:
        statements:
          - effect: Allow
            principals: ["admin"]
            actions: ["sts:AssumeRole"]
      policies:
        - statements:
            - effect: Allow
              actions: ["s3:GetObject", "s3:ListBucket"]
              resources: ["arn:mockbucket:s3:::demo", "arn:mockbucket:s3:::demo/*"]
  s3:
    access_keys:
      - id: admin
        secret: admin-secret
        principal: admin
  objects:
    - bucket: demo
      key: bootstrap/hello.txt
      content: hello from mockbucket
