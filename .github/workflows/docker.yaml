name: docker

on:
  push:
    branches: [main]

permissions:
  packages: write
  id-token: write
  security-events: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-

      - name: Build for local scan
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v7.0.0
        with:
          context: .
          load: true
          tags: mockbucket:scan
          cache-from: type=gha

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7 # v0.35.0
        with:
          image-ref: 'mockbucket:scan'
          format: sarif
          output: trivy-results.sarif
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Fail on CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7 # v0.35.0
        with:
          image-ref: 'mockbucket:scan'
          format: table
          exit-code: '1'
          severity: 'CRITICAL'

      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-platform
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v7.0.0
        id: build
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Sign image with cosign
        run: cosign sign --yes ${{ steps.build.outputs.digest }}
