name: gate

on:
  workflow_call:
    inputs:
      run_pyspark:
        required: false
        type: boolean
        default: false
      pyspark_environment:
        required: false
        type: string
        default: ""

jobs:
  compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
      - uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6

      - name: Build mockbucketd
        run: make build

      - name: Compat tests
        run: make compat

  compat-pyspark:
    needs:
      - compat
      - lint-and-test
      - pyspark-approval
    if: >-
      ${{
        always() &&
        !cancelled() &&
        inputs.run_pyspark &&
        needs.compat.result == 'success' &&
        needs.lint-and-test.result == 'success' &&
        (inputs.pyspark_environment == '' || needs.pyspark-approval.result == 'success')
      }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - cloud: aws
            spark_packages: org.apache.hadoop:hadoop-aws:3.3.4
          - cloud: gcs
            spark_packages: com.google.cloud.bigdataoss:gcs-connector:hadoop3-2.2.26
    env:
      SPARK_LOCAL_IP: 127.0.0.1
      MOCKBUCKET_SPARK_IVY: /tmp/mockbucket-spark-ivy
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5.0.0
        with:
          distribution: temurin
          java-version: "17"
      - uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6

      - name: Build mockbucketd
        run: make build

      - name: Run PySpark compat tests
        env:
          MOCKBUCKET_SPARK_S3_PACKAGES: ${{ matrix.cloud == 'aws' && matrix.spark_packages || '' }}
          MOCKBUCKET_SPARK_GCS_PACKAGES: ${{ matrix.cloud == 'gcs' && matrix.spark_packages || '' }}
        run: make compat COMPAT_ARGS="--with-pyspark ${{ matrix.cloud }}"

  pyspark-approval:
    if: ${{ inputs.run_pyspark && inputs.pyspark_environment != '' }}
    needs:
      - compat
      - lint-and-test
    runs-on: ubuntu-latest
    environment: ${{ inputs.pyspark_environment }}
    steps:
      - name: Await approval
        run: echo "PySpark compat tests approved"

  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: make fmt-check

      - name: Vet
        run: make lint

      - name: Build
        run: make build

      - name: Test
        run: make test TEST_ARGS="-race -count=1 ./..."
