name: gate

on:
  workflow_call:
    inputs:
      run_pyspark:
        required: false
        type: boolean
        default: false
      pyspark_environment:
        required: false
        type: string
        default: ""

jobs:
  compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
      - uses: astral-sh/setup-uv@v5

      - name: Build mockbucketd
        run: go build -o ./bin/mockbucketd ./cmd/mockbucketd

      - name: Compat tests
        run: uv run --project scripts/compat mockbucket-compat test

  compat-pyspark:
    needs:
      - compat
      - lint-and-test
      - pyspark-approval
    if: >-
      ${{
        always() &&
        !cancelled() &&
        inputs.run_pyspark &&
        needs.compat.result == 'success' &&
        needs.lint-and-test.result == 'success' &&
        (inputs.pyspark_environment == '' || needs.pyspark-approval.result == 'success')
      }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - cloud: aws
            spark_packages: org.apache.hadoop:hadoop-aws:3.3.4
          - cloud: gcs
            spark_packages: com.google.cloud.bigdataoss:gcs-connector:hadoop3-2.2.26
    env:
      SPARK_LOCAL_IP: 127.0.0.1
      MOCKBUCKET_SPARK_IVY: /tmp/mockbucket-spark-ivy
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
      - uses: actions/setup-java@5eea28fe4b8d66df11a13a0d3d5e3f97b5f6c67f # v5.0.0
        with:
          distribution: temurin
          java-version: "17"
      - uses: astral-sh/setup-uv@v5

      - name: Build mockbucketd
        run: go build -o ./bin/mockbucketd ./cmd/mockbucketd

      - name: Run PySpark compat tests
        env:
          MOCKBUCKET_SPARK_S3_PACKAGES: ${{ matrix.cloud == 'aws' && matrix.spark_packages || '' }}
          MOCKBUCKET_SPARK_GCS_PACKAGES: ${{ matrix.cloud == 'gcs' && matrix.spark_packages || '' }}
        run: uv run --project scripts/compat mockbucket-compat test --with-pyspark ${{ matrix.cloud }}

  pyspark-approval:
    if: ${{ inputs.run_pyspark && inputs.pyspark_environment != '' }}
    needs:
      - compat
      - lint-and-test
    runs-on: ubuntu-latest
    environment: ${{ inputs.pyspark_environment }}
    steps:
      - name: Await approval
        run: echo "PySpark compat tests approved"

  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Files not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o /dev/null ./cmd/mockbucketd

      - name: Test
        run: go test -race -count=1 ./...
