name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run unit tests
        run: go test ./...
      - name: Install compat dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install awscli boto3
      - name: Run compatibility suite
        run: ./scripts/compat/run_all.sh
