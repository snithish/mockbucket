name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_pyspark:
        description: Run the PySpark compat matrix
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  gate:
    uses: ./.github/workflows/gate.yaml
    with:
      run_pyspark: ${{ github.event_name == 'workflow_dispatch' && inputs.run_pyspark }}
